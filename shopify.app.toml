# shopify.app.toml — Phase 3 update
# Added: app_subscriptions/update webhook, billing callback redirect URL

client_id = "e823568de22df22b01ece8794d2121a0"
name = "PostShip"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[app_proxy]
url      = "https://example.com/proxy"
subpath  = "postship"
prefix   = "apps"

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri    = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri    = "/webhooks/app/scopes_update"

  # ── Billing ──────────────────────────────────────────────────────────────
  # Fires when a subscription is activated, cancelled, frozen, or trial ends
  [[webhooks.subscriptions]]
  topics = ["app_subscriptions/update"]
  uri    = "/webhooks/app/subscriptions/update"

  # ── Order events ─────────────────────────────────────────────────────────
  [[webhooks.subscriptions]]
  topics = ["orders/fulfilled"]
  uri    = "/webhooks/orders/fulfilled"

  [[webhooks.subscriptions]]
  topics = ["orders/cancelled"]
  uri    = "/webhooks/orders/cancelled"

  [[webhooks.subscriptions]]
  topics = ["orders/updated"]
  uri    = "/webhooks/orders/updated"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri    = "/webhooks/orders/create"

  # ── Fulfillment events ────────────────────────────────────────────────────
  [[webhooks.subscriptions]]
  topics = ["fulfillments/create"]
  uri    = "/webhooks/fulfillments/create"

  [[webhooks.subscriptions]]
  topics = ["fulfillments/update"]
  uri    = "/webhooks/fulfillments/update"

[access_scopes]
scopes = "read_orders,write_orders,read_fulfillments,write_fulfillments,read_customers,read_products"

[auth]
redirect_urls = [
  "https://example.com/api/auth",
  "https://example.com/app/billing/callback"
]