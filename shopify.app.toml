# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e823568de22df22b01ece8794d2121a0"
name = "ota"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  # PostShip: listen for order fulfillment changes (for tracking email triggers)
  [[webhooks.subscriptions]]
  topics = [ "orders/fulfilled" ]
  uri = "/webhooks/orders/fulfilled"

  [[webhooks.subscriptions]]
  topics = [ "orders/cancelled" ]
  uri = "/webhooks/orders/cancelled"

[access_scopes]
# read_orders + write_orders — required for order tracking, cancel requests
# read_fulfillments — required for tracking info
# read_customers — required after Protected Customer Data approval
scopes = "read_orders,write_orders,read_fulfillments,write_fulfillments,read_customers,write_products"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

# ── PostShip product metafield (kept from template) ──────────────────────────
[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[app_proxy]
url = "https://example.com/proxy"
subpath = "postship"
prefix = "apps"  